    target: 4.5
  - name: Canonical violet normal text on light
    foreground: "#7B61FF"
    background: "#FFFFFF"
    target: 4.5
  - name: Readable violet text on light
    foreground: "#6F52E5"
    background: "#FFFFFF"
    target: 4.5
  - name: Canonical blue normal text on light
    foreground: "#007AFF"
    background: "#FFFFFF"
    target: 4.5
  - name: Readable blue text on light
