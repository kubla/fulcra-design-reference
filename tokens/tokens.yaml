meta:
  title: Fulcra visual token reference
  subtitle: A working cross-surface reference for color, type, rhythm, shape, and depth.
  note: Surface-specific DESIGN.md files govern when this reference and a surface rule differ.

color_groups:
  - name: Brand
    description: Stable identity primitives. Readable variants adapt them to normal text.
    tokens:
      - name: Mint
        css: --color-brand-mint
        value: "#56D6B7"
        use: Identity, normal action, current data, connection, and gradient start.
      - name: Violet
        css: --color-brand-violet
        value: "#7B61FF"
        use: Selection, interpretation, identity endpoint, and gradient end.
      - name: Blue
        css: --color-brand-blue
        value: "#007AFF"
        use: Information, reference, previous period, and explicit third category.
  - name: Dark surfaces and ink
    description: Product-native fields, panels, dividers, and text.
    tokens:
      - name: Canvas
        css: --color-surface-dark
        value: "#000000"
        use: Maximum-depth product and illustration field.
      - name: Panel
        css: --color-panel-dark
        value: "#16161D"
        use: Primary card, navigation, table, modal, and diagram panel.
      - name: Raised panel
        css: --color-panel-dark-raised
        value: "#222227"
        use: Hover, nested, or differentiated dark surface.
      - name: Divider
        css: --color-divider-dark
        value: "#38383A"
        use: Navigation, axis, and quiet boundary.
      - name: Strong divider
        css: --color-divider-dark-strong
        value: "#333333"
        use: Stronger table or panel boundary.
      - name: Primary ink
        css: --color-text-on-dark
        value: "#FFFFFF"
        use: Main copy, essential labels, and active icons.
      - name: Secondary ink
        css: --color-text-on-dark-muted
        value: "#8A8A8E"
        use: Metadata, axes, inactive labels, and annotations.
  - name: Light surfaces and ink
    description: Editorial fields and semantic grouping surfaces.
    tokens:
      - name: Canvas
        css: --color-surface-light
        value: "#FFFFFF"
        use: Main light field and ordinary light card.
      - name: Primary ink
        css: --color-text-on-light
        value: "#16161D"
        use: Headlines, body copy, icons, and controls.
      - name: Secondary ink
        css: --color-text-on-light-muted
        value: "#626A78"
        use: Supporting copy, captions, axes, and visible boundaries.
      - name: Pale mint
        css: --color-surface-context
        value: "#E6F9F1"
        use: Owned context, coordination, or availability grouping.
      - name: Pale violet
        css: --color-surface-agent
        value: "#E0D8FE"
        use: Agent, loop, memory, or interpretation grouping.
      - name: Pale blue
        css: --color-surface-info
        value: "#D8EBFE"
        use: Permission, system, reference, or comparison grouping.
      - name: Decorative divider
        css: --color-divider-light
        value: "#D9DCE2"
        use: Noninteractive separation only; not a sufficient control boundary.
  - name: Readable accents
    description: Normal-text and control variants for accessible foreground/background pairs.
    tokens:
      - name: Mint on light
        css: --color-text-mint-light
        value: "#287D69"
        use: Mint text, link, outline, and focus on white.
      - name: Violet on light
        css: --color-text-violet-light
        value: "#6F52E5"
        use: Violet normal text or a filled control carrying white text.
      - name: Violet on dark
        css: --color-text-violet-dark
        value: "#9C88FF"
        use: Violet normal text on #16161D.
      - name: Blue on light
        css: --color-text-blue-light
        value: "#0066CC"
        use: Blue normal text and links on white.
      - name: Blue on dark
        css: --color-text-blue-dark
        value: "#0A84FF"
        use: Blue normal text on #16161D.
  - name: Status
    description: Pair every status color with a label, icon, shape, or line style.
    tokens:
      - name: Success fill
        css: --color-success
        value: "#34C759"
        use: Product success fill or non-text mark.
      - name: Success text on light
        css: --color-success-text-light
        value: "#208637"
        use: Normal success text on white.
      - name: Error fill
        css: --color-error
        value: "#FF3B30"
        use: Product error or destructive fill and mark.
      - name: Error text on light
        css: --color-error-text-light
        value: "#D70015"
        use: Normal error text on white.
      - name: Warning fill
        css: --color-warning
        value: "#FFCC00"
        use: Warning fill with dark ink.
      - name: Warning text on light
        css: --color-warning-text-light
        value: "#765A00"
        use: Normal warning text on white.

gradients:
  - name: Brand diagonal
    css: --gradient-brand-diagonal
    value: "linear-gradient(135deg, #56D6B7 0%, #7B61FF 100%)"
    use: Identity, selected context, active transformation, or owned core.
  - name: Brand vertical
    css: --gradient-brand-vertical
    value: "linear-gradient(180deg, #56D6B7 0%, #7B61FF 100%)"
    use: Logo-like mark, icon, or short gradient text.
  - name: Brand wash
    css: --gradient-brand-wash
    value: "linear-gradient(45deg, rgba(86,214,183,.10), rgba(123,97,255,.10))"
    use: Bounded dark card wash, never a page default.

typography:
  - surface: Context Mobile
    family: San Francisco / iOS system
    roles: largeTitle, title, title2, title3, headline, subheadline, body, callout, footnote, caption, caption2
    rule: Use semantic styles and Dynamic Type. Use monospaced digits for aligned metrics and time.
  - surface: Context Web
    family: Rubik
    roles: 12px metadata; 14px controls and rows; 16px body; 18px feature title; 20–24px strong title
    rule: Regular, medium, and semibold carry routine hierarchy. Use tabular numerals for aligned data.
  - surface: Fulcra Website
    family: Rubik / DM Sans / Roboto Mono
    roles: Rubik display and UI; DM Sans editorial body; Roboto Mono technical values
    rule: Keep display copy short, body copy readable, and monospace content-specific.

spacing:
  - name: 1
    value: 4
    use: Hairline-adjacent and very dense internal relationship.
  - name: 2
    value: 8
    use: Compact controls and repeated dense gaps.
  - name: 3
    value: 12
    use: Mobile card internals and compact section padding.
  - name: 4
    value: 16
    use: General control and card padding.
  - name: 6
    value: 24
    use: Major card padding and product section separation.
  - name: 8
    value: 32
    use: Larger group separation.
  - name: 12
    value: 48
    use: Website phone section interval.
  - name: 16
    value: 64
    use: Website tablet section interval.
  - name: 24
    value: 96
    use: Website wide editorial section interval.

radii:
  - name: Compact control
    value: 8
    use: Buttons, inputs, chips, and compact cards.
  - name: Standard card
    value: 12
    use: Mobile cards, contextual web cards, and website cards.
  - name: Editorial panel
    value: 16
    use: Spacious website panels and product frames.
  - name: Pill
    value: 9999
    use: Pills, badges, and circular actions.

shadows:
  - name: Default card
    value: none
    use: Prefer tonal fill and border separation.
  - name: Compact mobile control
    value: "0 4px 8px rgba(0,0,0,.24)"
    use: Bounded pill or search-action depth.
  - name: Website floating
    value: "0 12px 32px rgba(22,22,29,.12)"
    use: Floating dialog or media only.

